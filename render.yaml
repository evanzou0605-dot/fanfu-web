services:
  - type: web
    name: fanfu-web
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/config
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: DATA_DIR
        value: /var/data/fanfu
    disks:
      - name: fanfu-data
        mountPath: /var/data
        sizeGB: 5
