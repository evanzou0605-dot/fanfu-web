    <title>某省政协原党组成员、副主席张某某接受纪律审查和监察调查</title>
  </head>
  <body>
    <div class="article-info">2026年04月18日</div>
    <div class="content">
      中央纪委国家监委网站讯 某省政协原党组成员、副主席张某某涉嫌严重违纪违法，目前正接受中央纪委国家监委纪律审查和监察调查。
      张某某，男，1967年5月出生，曾任某市委书记，后任某省政协党组成员、副主席。
    </div>
